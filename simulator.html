<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Explore blockchain fundamentals. Mine blocks, edit data, and watch cryptographic hashes validate or break chain integrity in real-time.">
  <title>L2_ARCHITECT | Cryptographic Block Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app-container">
    <!-- Global Sticky Header -->
    <header class="global-header" id="main-header">
      <div class="header-container">
        <a href="index.html" class="logo" id="header-logo">
          <span class="logo-icon"></span>L2_ARCHITECT
        </a>
        <button class="menu-toggle" id="menu-toggle" aria-expanded="false" aria-controls="nav-menu">
          MENU_
        </button>
        <nav class="nav-menu-wrapper" id="nav-menu-wrapper">
          <ul class="nav-menu" id="nav-menu">
            <li class="nav-item">
              <a href="index.html" class="nav-link" id="nav-home">Home</a>
            </li>
            <li class="nav-item">
              <a href="concepts.html" class="nav-link" id="nav-concepts">Concepts</a>
            </li>
            <li class="nav-item">
              <a href="prices.html" class="nav-link" id="nav-prices">Live Prices</a>
            </li>
            <li class="nav-item">
              <a href="simulator.html" class="nav-link active" id="nav-simulator">Block Simulator</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <!-- Simulator Section -->
      <section class="simulator-section" id="simulator">
        <div class="section-container">
          <div class="section-header">
            <div class="section-meta">SYS_SIMULATOR: PROOF_OF_WORK</div>
            <h1 class="section-title" id="simulator-title">Cryptographic Block Simulator</h1>
          </div>

          <!-- Chain Wrapper with dashed connector line -->
          <div class="chain-wrapper">
            <div class="chain-link-line"></div>

            <div class="chain-container" id="chain-container">
              <!-- BLOCK 1 Panel -->
              <div class="block-panel block-valid" id="block1-panel">
                <div class="block-panel-header">
                  <span class="block-title">BLOCK #1</span>
                  <span class="block-status-badge" id="block1-status">VALID</span>
                </div>

                <!-- Data Field -->
                <div class="block-field">
                  <label for="block1-data">Data (payload):</label>
                  <input type="text" id="block1-data" placeholder="Type data here..." autocomplete="off">
                </div>

                <!-- Previous Hash -->
                <div class="block-field">
                  <label for="block1-prev">Previous Hash:</label>
                  <input type="text" id="block1-prev" class="hash-display" value="0000000000000000" readonly>
                </div>

                <!-- Nonce -->
                <div class="block-field">
                  <label for="block1-nonce">Nonce:</label>
                  <input type="text" id="block1-nonce" value="0" readonly>
                </div>

                <!-- Current Hash -->
                <div class="block-field">
                  <label for="block1-hash">Current Hash:</label>
                  <input type="text" id="block1-hash" class="hash-display" readonly>
                </div>

                <!-- Mine Button -->
                <button class="btn-terminal btn-terminal-orange" id="block1-mine">
                  <span>[ MINE_BLOCK ]</span>
                  <span class="font-mono">_</span>
                </button>
              </div>

              <!-- BLOCK 2 Panel -->
              <div class="block-panel block-valid" id="block2-panel">
                <div class="block-panel-header">
                  <span class="block-title">BLOCK #2</span>
                  <span class="block-status-badge" id="block2-status">VALID</span>
                </div>

                <!-- Data Field -->
                <div class="block-field">
                  <label for="block2-data">Data (payload):</label>
                  <input type="text" id="block2-data" placeholder="Type data here..." autocomplete="off">
                </div>

                <!-- Previous Hash -->
                <div class="block-field">
                  <label for="block2-prev">Previous Hash:</label>
                  <input type="text" id="block2-prev" class="hash-display" readonly>
                </div>

                <!-- Nonce -->
                <div class="block-field">
                  <label for="block2-nonce">Nonce:</label>
                  <input type="text" id="block2-nonce" value="0" readonly>
                </div>

                <!-- Current Hash -->
                <div class="block-field">
                  <label for="block2-hash">Current Hash:</label>
                  <input type="text" id="block2-hash" class="hash-display" readonly>
                </div>

                <!-- Mine Button -->
                <button class="btn-terminal btn-terminal-orange" id="block2-mine">
                  <span>[ MINE_BLOCK ]</span>
                  <span class="font-mono">_</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Global Footer -->
    <footer class="global-footer" id="main-footer">
      <div class="footer-container">
        <div class="footer-left" id="footer-credits">
          <span class="footer-status-indicator"></span>
          <span>L2_ARCHITECT // DESIGNED BY KUNJ S. KAKA </span>
        </div>
        <div class="footer-right" id="footer-github">
          <a href="https://github.com" target="_blank" rel="noopener noreferrer" id="github-link">GITHUB_REPOSITORY</a>
        </div>
      </div>
    </footer>
  </div>

  <script src="app.js"></script>
</body>

</html>
